<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空手部 防具リアルタイム共有システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 text-gray-800">

    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 space-y-8">
        <header class="text-center border-b pb-4">
            <h1 class="text-2xl font-bold text-blue-600 flex justify-center items-center gap-2">
                🥋 空手部 防具管理 (学内アカウント同期版)
            </h1>
            <p class="text-sm text-gray-500 mt-1">Googleスプレッドシートと直結して全員で在庫を共有</p>
        </header>

        <div id="loading-bar" class="text-center py-2 bg-amber-100 text-amber-800 text-xs font-bold rounded-lg hidden animate-pulse">
            🔄 データを同期中...
        </div>

        <section>
            <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">📊 拠点別の合計在庫</h2>
            <div class="space-y-3">
                <div class="bg-blue-50 p-3 rounded-xl grid grid-cols-4 items-center gap-2 text-sm">
                    <span class="font-bold text-blue-800">① 面 (MEN)</span>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">船橋</div><div id="total-men-funabashi" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">御茶ノ水</div><div id="total-men-surugadai" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">遠征</div><div id="total-men-ensei" class="font-bold">0</div></div>
                </div>
                <div class="bg-red-50 p-3 rounded-xl grid grid-cols-4 items-center gap-2 text-sm">
                    <span class="font-bold text-red-800">② 拳サポ (KEN)</span>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">船橋</div><div id="total-ken-funabashi" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">御茶ノ水</div><div id="total-ken-surugadai" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">遠征</div><div id="total-ken-ensei" class="font-bold">0</div></div>
                </div>
                <div class="bg-orange-50 p-3 rounded-xl grid grid-cols-4 items-center gap-2 text-sm">
                    <span class="font-bold text-orange-800">③ 足サポ (ASI)</span>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">船橋</div><div id="total-asi-funabashi" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">御茶ノ水</div><div id="total-asi-surugadai" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">遠征</div><div id="total-asi-ensei" class="font-bold">0</div></div>
                </div>
                <div class="bg-purple-50 p-3 rounded-xl grid grid-cols-4 items-center gap-2 text-sm">
                    <span class="font-bold text-purple-800">④ カップ (FC)</span>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">船橋</div><div id="total-fc-funabashi" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">御茶ノ水</div><div id="total-fc-surugadai" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">遠征</div><div id="total-fc-ensei" class="font-bold">0</div></div>
                </div>
                <div class="bg-green-50 p-3 rounded-xl grid grid-cols-4 items-center gap-2 text-sm">
                    <span class="font-bold text-green-800">⑤ 胴当て (DO)</span>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">船橋</div><div id="total-do-funabashi" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">御茶ノ水</div><div id="total-do-surugadai" class="font-bold">0</div></div>
                    <div class="bg-white p-1 rounded text-center"><div class="text-gray-500 text-xs">遠征</div><div id="total-do-ensei" class="font-bold">0</div></div>
                </div>
            </div>
        </section>

        <section class="bg-gray-50 p-4 rounded-xl space-y-4">
            <h2 class="text-base font-bold flex items-center gap-2 text-gray-700">🔄 移動を記録する</h2>
            <div class="border border-gray-300 rounded-lg p-2 bg-white text-center">
                <button id="btn-toggle-camera" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg cursor-pointer">
                    📷 QRスキャンを起動する
                </button>
                <div id="qr-reader" class="mt-2 hidden rounded-lg overflow-hidden"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">防具ID</label>
                    <input type="text" id="input-armor-id" placeholder="例: KEN-L-赤-001" class="w-full border rounded-lg px-3 py-2 bg-white font-mono uppercase">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">新しい移動先</label>
                    <select id="select-location" class="w-full border rounded-lg px-3 py-2 bg-white font-medium">
                        <option value="船橋">船橋キャンパス</option>
                        <option value="御茶ノ水">御茶ノ水（駿河台）</option>
                        <option value="遠征">遠征（持ち出し）</option>
                    </select>
                </div>
            </div>
            <button id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow cursor-pointer">
                移動を確定する
            </button>
        </section>

        <section>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold flex items-center gap-2">📋 各防具の現在地一覧</h2>
                <button id="btn-refresh" class="text-xs bg-gray-200 hover:bg-gray-300 px-2.5 py-1 rounded font-medium cursor-pointer">🔄 手動更新</button>
            </div>
            <div class="border rounded-xl overflow-hidden shadow-xs max-h-96 overflow-y-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 text-gray-600 font-bold border-b sticky top-0">
                        <tr>
                            <th class="p-3">防具ID</th>
                            <th class="p-3">種類</th>
                            <th class="p-3">現在の所在状況</th>
                        </tr>
                    </thead>
                    <tbody id="armor-list-table" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // 🚨 【重要】ここに最新のウェブアプリURLを貼り付けてください！
        const GAS_URL = "https://script.google.com/a/macros/g.nihon-u.ac.jp/s/AKfycbwV8KwgI8wx-NKQ5DN1A1WbbkVuv-Ncbtj_rFAZBiFq5iSpHDnqx63SrmPwgwIUITv7/exec";

        let armorItems = [];

        // 💡 学内アカウント制限を回避するJSONP通信用の関数
        function fetchFromSpreadsheet() {
            document.getElementById('loading-bar').classList.remove('hidden');
            
            // 古いスクリプトタグがあれば削除
            const oldScript = document.getElementById('gas-jsonp');
            if (oldScript) oldScript.remove();

            // 新しいスクリプトタグを作ってデータを引っ張る
            const script = document.createElement('script');
            script.id = 'gas-jsonp';
            script.src = `${GAS_URL}?callback=handleGASResponse`;
            document.body.appendChild(script);
        }

        // 💡 データを受け取った後の処理
        window.handleGASResponse = function(data) {
            if (data && data.status) {
                if (data.status === "success") {
                    alert("同期成功: 移動を記録しました！");
                    fetchFromSpreadsheet();
                } else {
                    alert("エラー: 更新に失敗しました。");
                }
            } else {
                armorItems = data;
                updateDisplay();
            }
            document.getElementById('loading-bar').classList.add('hidden');
        };

        function updateDisplay() {
            const counts = {
                men: { 船橋: 0, 御茶ノ水: 0, 遠征: 0 },
                ken: { 船橋: 0, 御茶ノ水: 0, 遠征: 0 },
                asi: { 船橋: 0, 御茶ノ水: 0, 遠征: 0 },
                fc:  { 船橋: 0, 御茶ノ水: 0, 遠征: 0 },
                do:  { 船橋: 0, 御茶ノ水: 0, 遠征: 0 }
            };

            const tableBody = document.getElementById('armor-list-table');
            tableBody.innerHTML = ""; 

            armorItems.forEach(item => {
                if (item.id.startsWith("MEN")) counts.men[item.location]++;
                else if (item.id.startsWith("KEN")) counts.ken[item.location]++;
                else if (item.id.startsWith("ASI")) counts.asi[item.location]++;
                else if (item.id.startsWith("FC"))  counts.fc[item.location]++;
                else if (item.id.startsWith("DO"))  counts.do[item.location]++;

                const row = document.createElement('tr');
                let badgeColor = "bg-gray-100 text-gray-800";
                if(item.location === "船橋") badgeColor = "bg-blue-100 text-blue-800 font-medium";
                if(item.location === "御茶ノ水") badgeColor = "bg-purple-100 text-purple-800 font-medium";
                if(item.location === "遠征") badgeColor = "bg-amber-100 text-amber-800 font-medium";

                row.innerHTML = `
                    <td class="p-3 font-mono font-bold">${item.id}</td>
                    <td class="p-3 text-xs text-gray-600">${item.type}</td>
                    <td class="p-3"><span class="px-2.5 py-1 rounded-full text-xs ${badgeColor}">${item.location}</span></td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('total-men-funabashi').innerText = counts.men["船橋"] || 0;
            document.getElementById('total-men-surugadai').innerText = counts.men["御茶ノ水"] || 0;
            document.getElementById('total-men-ensei').innerText = counts.men["遠征"] || 0;
            document.getElementById('total-ken-funabashi').innerText = counts.ken["船橋"] || 0;
            document.getElementById('total-ken-surugadai').innerText = counts.ken["御茶ノ水"] || 0;
            document.getElementById('total-ken-ensei').innerText = counts.ken["遠征"] || 0;
            document.getElementById('total-asi-funabashi').innerText = counts.asi["船橋"] || 0;
            document.getElementById('total-asi-surugadai').innerText = counts.asi["御茶ノ水"] || 0;
            document.getElementById('total-asi-ensei').innerText = counts.asi["遠征"] || 0;
            document.getElementById('total-fc-funabashi').innerText = counts.fc["船橋"] || 0;
            document.getElementById('total-fc-surugadai').innerText = counts.fc["御茶ノ水"] || 0;
            document.getElementById('total-fc-ensei').innerText = counts.fc["遠征"] || 0;
            document.getElementById('total-do-funabashi').innerText = counts.do["船橋"] || 0;
            document.getElementById('total-do-surugadai').innerText = counts.do["御茶ノ水"] || 0;
            document.getElementById('total-do-ensei').innerText = counts.do["遠征"] || 0;
        }

        fetchFromSpreadsheet();
        document.getElementById('btn-refresh').addEventListener('click', fetchFromSpreadsheet);

        // --- QRコードカメラの制御 ---
        let html5QrcodeScanner = null;
        let isScanning = false; 
        const cameraButton = document.getElementById('btn-toggle-camera');
        const qrReaderDiv = document.getElementById('qr-reader');

        function stopCamera() {
            if (html5QrcodeScanner) {
                return html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    qrReaderDiv.classList.add('hidden');
                    cameraButton.innerText = "📷 QRスキャンを起動する";
                    isScanning = false;
                });
            }
            return Promise.resolve();
        }

        cameraButton.addEventListener('click', () => {
            if (html5QrcodeScanner) {
                stopCamera().catch(err => console.error(err));
            } else {
                qrReaderDiv.classList.remove('hidden');
                cameraButton.innerText = "カメラを閉じる";
                isScanning = false;
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (qrText) => {
                        if (isScanning) return; 
                        isScanning = true; 
                        stopCamera().then(() => {
                            document.getElementById('input-armor-id').value = qrText.toUpperCase();
                        });
                    },
                    (errorMessage) => {}
                ).catch(err => alert("カメラ起動エラー"));
            }
        });

        // --- 移動確定処理 ---
        document.getElementById('btn-submit').addEventListener('click', () => {
            const armorId = document.getElementById('input-armor-id').value.trim().toUpperCase();
            const newLocation = document.getElementById('select-location').value;

            if (!armorId) {
                alert("防具IDを入力、またはQRをスキャンしてください。");
                return;
            }

            const foundItem = armorItems.find(item => item.id === armorId);
            if (!foundItem) {
                alert(`エラー:「${armorId}」は登録されていません。`);
                return;
            }

            document.getElementById('loading-bar').classList.remove('hidden');

            // 💡 学内アカウント制限を回避するため、こちらもURL経由で送信
            const script = document.createElement('script');
            script.src = `${GAS_URL}?callback=handleGASResponse&id=${encodeURIComponent(armorId)}&location=${encodeURIComponent(newLocation)}`;
            document.body.appendChild(script);

            document.getElementById('input-armor-id').value = "";
        });
    </script>
</body>
</html>

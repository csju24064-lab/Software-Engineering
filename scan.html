<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空手部 防具管理システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 text-gray-800">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600 flex justify-center items-center gap-2">
                🥋 空手部 防具管理
            </h1>
            <p class="text-sm text-gray-500 mt-1">リアルタイム在庫・拠点管理</p>
        </header>

        <section class="mb-8">
            <h2 class="text-lg font-semibold border-b pb-2 mb-4 flex items-center gap-2">
                📊 現在の在庫・所在状況
            </h2>
            
            <div class="space-y-4">
                <div class="bg-blue-50 p-3 rounded-xl">
                    <span class="font-bold text-blue-800 block mb-2">① 面 (MEN)</span>
                    <div class="grid grid-cols-3 gap-2 text-center text-sm">
                        <div class="bg-white p-2 rounded-lg shadow-xs">
                            <div class="text-gray-500 text-xs">船橋</div>
                            <div id="stock-men-funabashi" class="text-lg font-bold text-gray-800">0</div>
                        </div>
                        <div class="bg-white p-2 rounded-lg shadow-xs">
                            <div class="text-gray-500 text-xs">駿河台</div>
                            <div id="stock-men-surugadai" class="text-lg font-bold text-gray-800">0</div>
                        </div>
                        <div class="bg-white p-2 rounded-lg shadow-xs">
                            <div class="text-gray-500 text-xs">遠征</div>
                            <div id="stock-men-ensei" class="text-lg font-bold text-gray-800">0</div>
                        </div>
                    </div>
                </div>

                <div class="bg-green-50 p-3 rounded-xl">
                    <span class="font-bold text-green-800 block mb-2">② 胴 (DO)</span>
                    <div class="grid grid-cols-3 gap-2 text-center text-sm">
                        <div class="bg-white p-2 rounded-lg shadow-xs">
                            <div class="text-gray-500 text-xs">船橋</div>
                            <div id="stock-do-funabashi" class="text-lg font-bold text-gray-800">0</div>
                        </div>
                        <div class="bg-white p-2 rounded-lg shadow-xs">
                            <div class="text-gray-500 text-xs">駿河台</div>
                            <div id="stock-do-surugadai" class="text-lg font-bold text-gray-800">0</div>
                        </div>
                        <div class="bg-white p-2 rounded-lg shadow-xs">
                            <div class="text-gray-500 text-xs">遠征</div>
                            <div id="stock-do-ensei" class="text-lg font-bold text-gray-800">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <h2 class="text-lg font-semibold border-b pb-2 mb-2 flex items-center gap-2">
                🔄 移動データの入力
            </h2>

            <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 bg-gray-50 text-center">
                <button id="btn-toggle-camera" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-xl shadow-md transition duration-200 cursor-pointer">
                    📷 QRスキャンを起動する
                </button>
                <div id="qr-reader" class="mt-4 hidden overflow-hidden rounded-lg"></div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">防具ID (QRから自動入力)</label>
                    <input type="text" id="input-armor-id" placeholder="例: MEN-001" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 bg-gray-50 font-mono text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">移動先を選択</label>
                    <select id="select-location" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 bg-white font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="funabashi">船橋キャンパス</option>
                        <option value="surugadai">駿河台キャンパス</option>
                        <option value="ensei">遠征（持ち出し）</option>
                    </select>
                </div>

                <button id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition duration-200 mt-2 cursor-pointer">
                    移動を確定する
                </button>
            </div>
        </section>
    </div>

    <script>
        // --- 1. データ構造と初期化 (保存機能) ---
        // 保存データの初期状態（データがない場合）
        const defaultData = {
            men: { funabashi: 0, surugadai: 0, ensei: 0 },
            do: { funabashi: 0, surugadai: 0, ensei: 0 }
        };

        // スマホ/PC内に保存されているデータを読み込む
        let armorData = JSON.parse(localStorage.getItem('karateArmorData')) || defaultData;

        // 画面の数字表示を最新データに書き換える関数
        function updateDisplay() {
            document.getElementById('stock-men-funabashi').innerText = armorData.men.funabashi;
            document.getElementById('stock-men-surugadai').innerText = armorData.men.surugadai;
            document.getElementById('stock-men-ensei').innerText = armorData.men.ensei;
            document.getElementById('stock-do-funabashi').innerText = armorData.do.funabashi;
            document.getElementById('stock-do-surugadai').innerText = armorData.do.surugadai;
            document.getElementById('stock-do-ensei').innerText = armorData.do.ensei;
        }

        // データをスマホ内に「保存」する関数
        function saveToStorage() {
            localStorage.setItem('karateArmorData', JSON.stringify(armorData));
            updateDisplay();
        }

        // アプリ起動時に数字を表示
        updateDisplay();


        // --- 2. QRコードスキャナーの処理 ---
        let html5QrcodeScanner = null;
        const cameraButton = document.getElementById('btn-toggle-camera');
        const qrReaderDiv = document.getElementById('qr-reader');

        cameraButton.addEventListener('click', () => {
            if (html5QrcodeScanner) {
                // カメラ停止処理
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    qrReaderDiv.classList.add('hidden');
                    cameraButton.innerText = "📷 QRスキャンを起動する";
                    cameraButton.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-xl shadow-md transition duration-200 cursor-pointer";
                }).catch(err => console.error(err));
            } else {
                // カメラ起動処理
                qrReaderDiv.classList.remove('hidden');
                cameraButton.innerText = "カメラを閉じる";
                cameraButton.className = "w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-xl shadow-md transition duration-200 cursor-pointer";

                html5QrcodeScanner = new Html5Qrcode("qr-reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (qrText) => {
                        // スキャン成功時
                        alert("QRコードを読み取りました: " + qrText);
                        document.getElementById('input-armor-id').value = qrText;
                    },
                    (errorMessage) => { /* スキャン中のエラーは無視 */ }
                ).catch(err => {
                    alert("カメラ起動エラー: 権限を許可してください。");
                    console.error(err);
                });
            }
        });


        // --- 3. 移動確定と自動仕分け処理 ---
        document.getElementById('btn-submit').addEventListener('click', () => {
            const armorId = document.getElementById('input-armor-id').value.trim().toUpperCase();
            const location = document.getElementById('select-location').value;

            if (!armorId) {
                alert("防具IDを入力、またはQRコードをスキャンしてください。");
                return;
            }

            // 【自動仕分け】IDの文字から防具の種類を判別する
            let type = "";
            if (armorId.startsWith("MEN")) {
                type = "men";
            } else if (armorId.startsWith("DO")) {
                type = "do";
            } else {
                alert("登録されていない防具IDです。'MEN' または 'DO' から始まるIDを使用してください。");
                return;
            }

            // 一度すべての拠点から在庫を引く（簡易的な所在移動シミュレーション）
            // ※本来は現在の場所を特定して移動させますが、今回は簡易版としてどこを選んでも上書きカウントします。
            armorData[type][location] += 1;

            // スマホに保存して画面を更新
            saveToStorage();

            alert(`防具 ${armorId} を ${document.getElementById('select-location').options[document.getElementById('select-location').selectedIndex].text} に登録しました！`);
            
            // 入力欄をクリア
            document.getElementById('input-armor-id').value = "";
        });
    </script>
</body>
</html>
